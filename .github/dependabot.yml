version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
      time: "09:00"
      timezone: Asia/Seoul
    groups:
      go-modules:
        patterns:
          - "*"
    open-pull-requests-limit: 5
