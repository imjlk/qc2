name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "the following files need gofmt:"
            echo "$files"
            exit 1
          fi

      - name: Test with race detector
        run: go test -race ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Check installer syntax
        run: sh -n scripts/install.sh

      - name: Smoke test commands
        run: |
          standalone="$(go run ./cmd/cpwd --print)"
          bundled="$(go run ./cmd/qc2 cpwd --print)"
          if [ "$standalone" != "$bundled" ]; then
            echo "standalone and bundled cpwd output differ"
            exit 1
          fi

  windows:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go on Windows
        run: go test ./...

      - name: Build installer fixture
        shell: pwsh
        run: go build -o "$env:RUNNER_TEMP\qc2.exe" ./cmd/qc2

      - name: Test installer with Windows PowerShell
        shell: powershell
        run: .\scripts\install.tests.ps1 -FixtureBinary "$env:RUNNER_TEMP\qc2.exe"

      - name: Test installer with PowerShell 7
        shell: pwsh
        run: .\scripts\install.tests.ps1 -FixtureBinary "$env:RUNNER_TEMP\qc2.exe"

      - name: Smoke test commands
        shell: pwsh
        run: |
          $standalone = (go run ./cmd/cpwd --print) -join "`n"
          $bundled = (go run ./cmd/qc2 cpwd --print) -join "`n"
          if ($standalone -ne $bundled) {
              throw "standalone and bundled cpwd output differ"
          }
