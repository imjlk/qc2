name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify source
        run: |
          go test ./...
          go vet ./...
          go build ./...

  build:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives
        env:
          TARGET_OS: ${{ matrix.goos }}
          TARGET_ARCH: ${{ matrix.goarch }}
          VERSION_TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -eu

          VERSION="${VERSION_TAG#v}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist

          for BIN_NAME in qc2 cpwd; do
            ARCHIVE_BASE="${BIN_NAME}_${VERSION}_${TARGET_OS}_${TARGET_ARCH}"
            OUTDIR="dist/${ARCHIVE_BASE}"
            EXT=""
            mkdir -p "$OUTDIR"

            if [ "$TARGET_OS" = "windows" ]; then
              EXT=".exe"
            fi

            CGO_ENABLED=0 GOOS="$TARGET_OS" GOARCH="$TARGET_ARCH" \
              go build \
              -trimpath \
              -ldflags "-s -w -X github.com/imjlk/qc2/internal/version.Version=${VERSION} -X github.com/imjlk/qc2/internal/version.Commit=${COMMIT} -X github.com/imjlk/qc2/internal/version.BuildDate=${BUILD_DATE}" \
              -o "$OUTDIR/${BIN_NAME}${EXT}" \
              "./cmd/${BIN_NAME}"

            cp LICENSE README.md "$OUTDIR/"

            if [ "$TARGET_OS" = "windows" ]; then
              (cd dist && zip -qr "${ARCHIVE_BASE}.zip" "$ARCHIVE_BASE")
            else
              tar -C dist -czf "dist/${ARCHIVE_BASE}.tar.gz" "$ARCHIVE_BASE"
            fi
          done

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
